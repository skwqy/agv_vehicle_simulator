# TCP client to YFAOS `AgvSocketServer` (FV2-compatible framing).

[socket]
host = "127.0.0.1"
port = 8008
connect_timeout_ms = 10000
read_timeout_ms = 0
max_frame_length = 65536
uplink_has_crc = true
reconnect_enabled = true
reconnect_interval_ms = 5000

[vehicle]
serial_number = "Vehicle_"
manufacturer = "defaultManufacturer"

[map]
enabled = true
xml_path = "maps/youle-final-4.xml"
layout_scale_mm = 1.0
layout_flip_y = false
sim_dt_seconds = 0.05
initial_point_name = "Point_1"

[map.name_prefixes]
apply_stripping = true
point_prefix = "Point_"
path_prefix = "Path_"

# Fleet: robot_count vehicles. serial_suffix_start + robot_index → serial suffix and protobuf agv_id
# (e.g. Vehicle_2 / agv_id 2, Vehicle_3 / agv_id 3, …).
[settings]
robot_count = 1
serial_suffix_start = 2
map_id = ""
log_max_file_bytes = 10485760
log_max_files = 10

[simulation]
status_interval_ms = 200
status_interval_moving_ms = 100
segment_travel_ms = 2000
default_linear_speed_mm_s = 500
battery_percent = 100
battery_low_threshold_percent = -1
charging = false
initial_point = 0
initial_x_mm = 0.0
initial_y_mm = 0.0
initial_heading_deg = 0.0
